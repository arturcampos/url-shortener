apiVersion: apps/v1
kind: Deployment
metadata:
	name: url-shortener
	labels:
		app: url-shortener
spec:
	replicas: 2
	selector:
		matchLabels:
			app: url-shortener
	template:
		metadata:
			labels:
				app: url-shortener
		spec:
			containers:
				- name: url-shortener
					image: ghcr.io/example/url-shortener:latest
					ports:
						- containerPort: 8080
					env:
						- name: DATABASE_URL
							value: "postgres://postgres:password@postgres:5432/urlshortener"
					readinessProbe:
						httpGet:
							path: /health
							port: 8080
						initialDelaySeconds: 5
						periodSeconds: 10
					livenessProbe:
						httpGet:
							path: /health
							port: 8080
						initialDelaySeconds: 15
						periodSeconds: 20
